<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 70" fill="none" aria-label="SecCon Group — Option B: Rounded rect tines, refined arches">
  <!--
    OPTION B — Refined rounded-rectangle tines (original concept, fixed)
    Rectangular tines with rounded corners and smooth quadratic arches.
    All symmetric around x=30.
      Center: x=28 w=4 → center=30
      Left:   x=14 w=4 → center=16, 14px left  ✓
      Right:  x=42 w=4 → center=44, 14px right ✓
  -->

  <!-- Silver tines -->
  <rect x="28" y="5"  width="4" height="37" fill="#C0C8D0" rx="2"/>
  <rect x="14" y="13" width="4" height="29" fill="#C0C8D0" rx="2"/>
  <rect x="42" y="13" width="4" height="29" fill="#C0C8D0" rx="2"/>

  <!-- Quadratic arch bridges — perfect mirror across x=30 -->
  <path d="M18 13 Q18 5 28 5" stroke="#C0C8D0" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M42 13 Q42 5 32 5" stroke="#C0C8D0" stroke-width="4" stroke-linecap="round" fill="none"/>

  <!-- Blue handle + base -->
  <rect x="28" y="42" width="4" height="13" fill="#4A9ECC" rx="1"/>
  <rect x="16" y="54" width="28" height="5"  fill="#4A9ECC" rx="2"/>

  <!-- Wordmark -->
  <text x="58" y="42" font-family="Oswald, sans-serif" font-size="28" font-weight="600" letter-spacing="1">
    <tspan fill="#4A9ECC">Sec</tspan><tspan fill="#C0C8D0">Con Group</tspan>
  </text>
  <text x="58" y="60" font-family="Inter, sans-serif" font-size="8.5" fill="#8899AA" letter-spacing="2" font-weight="400">THE SECURITY CONTRACTOR GROUP</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 70" fill="none" aria-label="SecCon Group — Option D: Traditional barbed trident">
  <!--
    OPTION D — Classical barbed trident (maritime / Neptune style)
    Center tine is tallest with a sharp triangular tip.
    Side tines have pointed tips PLUS outward-facing barbs — the hallmark
    of a traditional trident.  Symmetric around x=30.
      Center tip:   (30, 4)
      Left tip:     (16, 9)   — 14px left  ✓
      Right tip:    (44, 9)   — 14px right ✓
      Left barb:    points left  from x=10
      Right barb:   points right to x=50
  -->

  <!-- Center tine: shaft + pointed triangle tip -->
  <rect x="28" y="12" width="4" height="30" fill="#C0C8D0" rx="1"/>
  <polygon points="30,4  32,12  28,12" fill="#C0C8D0"/>

  <!-- Left tine: shaft + tip + outward barb -->
  <rect x="14" y="17" width="4" height="25" fill="#C0C8D0" rx="1"/>
  <polygon points="16,9  18,17  14,17"  fill="#C0C8D0"/>
  <polygon points="10,12  14,10  14,18" fill="#C0C8D0"/>

  <!-- Right tine: shaft + tip + outward barb (mirror of left) -->
  <rect x="42" y="17" width="4" height="25" fill="#C0C8D0" rx="1"/>
  <polygon points="44,9  46,17  42,17"  fill="#C0C8D0"/>
  <polygon points="50,12  46,10  46,18" fill="#C0C8D0"/>

  <!-- Curved bridges from side tines to center tine -->
  <path d="M18 17 C21 14 25 12 28 12" stroke="#C0C8D0" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M42 17 C39 14 35 12 32 12" stroke="#C0C8D0" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Blue handle + base -->
  <rect x="28" y="42" width="4" height="13" fill="#4A9ECC" rx="1"/>
  <rect x="16" y="54" width="28" height="5"  fill="#4A9ECC" rx="2"/>

  <!-- Wordmark -->
  <text x="58" y="42" font-family="Oswald, sans-serif" font-size="28" font-weight="600" letter-spacing="1">
    <tspan fill="#4A9ECC">Sec</tspan><tspan fill="#C0C8D0">Con Group</tspan>
  </text>
  <text x="58" y="60" font-family="Inter, sans-serif" font-size="8.5" fill="#8899AA" letter-spacing="2" font-weight="400">THE SECURITY CONTRACTOR GROUP</text>
</svg>
